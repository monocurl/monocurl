[workspace]
resolver = "2"

members = [
    "crates/autocomplete",
    "crates/cli",
    "crates/compiler",
    "crates/executor",
    "crates/exporter",
    "crates/geo",
    "crates/lexer",
    "crates/parser",
    "crates/renderer",
    "crates/server",
    "crates/stdlib",
    "crates/structs",
    "crates/ui",
    "crates/monocurl",
]

[workspace.dependencies]
log = "0.4.25"
env_logger = "0.11"
arrayvec = "0.7.6"
unicode-segmentation = "1.12.0"
open = "5.3.2"
dirs = "5.0.0"
serde = "1.0.228"
serde_json = "1.0.145"
schemars = "1.0.4"

gpui = { path = "../gpui/crates/gpui" }

autocomplete = { path = "crates/autocomplete" }
cli = { path = "crates/cli" }
compiler = { path = "crates/compiler" }
executor = { path = "crates/executor" }
exporter = { path = "crates/exporter" }
geo = { path = "crates/geo" }
lexer = { path = "crates/lexer" }
parser = { path = "crates/parser" }
renderer = { path = "crates/renderer" }
server = { path = "crates/server" }
stdlib = { path = "crates/stdlib" }
structs = { path = "crates/structs" }
ui = { path = "crates/ui" }
monocurl = { path = "crates/monocurl" }
